<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOT | Ecosystem Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-panel { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .market-card { transition: all 0.3s ease; }
        .market-card:hover { border-color: #8b5cf6; transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-white/5 px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="location.href='/dashboard'">
                <div class="w-9 h-9 bg-violet-600 rounded-xl flex items-center justify-center shadow-lg text-white font-bold italic">K</div>
                <span class="text-xl font-black tracking-tighter uppercase italic">KNOT <span class="text-violet-500 text-sm">Market</span></span>
            </div>
            <button onclick="openPostModal()" class="bg-violet-600 hover:bg-violet-500 px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all">List Item</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-8 py-12">
        <header class="mb-12">
            <h1 class="text-4xl font-black text-white tracking-tight mb-2">Ecosystem Marketplace</h1>
            <p class="text-slate-500 font-medium italic">Buy, sell, or trade assets within the KNOT network operatives.</p>
        </header>

        <div id="marketplace-feed" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-full p-20 text-center text-slate-600 animate-pulse">Syncing Marketplace Ledger...</div>
        </div>
    </main>

    <div id="post-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-6">
        <div class="glass-panel p-8 w-full max-w-md rounded-[2.5rem] border-t-2 border-violet-500">
            <h3 class="text-2xl font-black mb-6 uppercase italic">Create New Listing</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Listing Type</label>
                    <select id="post-type" class="w-full bg-slate-900 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-violet-500 mt-1">
                        <option value="Sell">For Sale (Price inside)</option>
                        <option value="Trade">Barter / Trade</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Item / Service Title</label>
                    <input type="text" id="post-title" placeholder="Ex: Calculus Book or Arduino Kit" class="w-full bg-slate-900 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-violet-500 mt-1">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1">Description & Pricing</label>
                    <textarea id="post-desc" rows="3" placeholder="Condition? Price? Exchange for what?" class="w-full bg-slate-900 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-violet-500 mt-1"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closePostModal()" class="flex-1 text-slate-500 font-bold uppercase text-[10px]">Abort</button>
                    <button onclick="submitPost()" class="flex-[2] bg-violet-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-violet-600/20">Authorize Broadcast</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://apiknot.niksoriginals.in";

        function openPostModal() { document.getElementById('post-modal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('post-modal').classList.add('hidden'); }

        async function fetchFeed() {
            try {
                // Requesting only Sell/Trade items via category filter
                const res = await fetch(`${API_BASE}/api/marketplace?category=market`, { credentials: 'include' });
                const items = await res.json();
                renderFeed(items);
            } catch (e) { console.error(e); }
        }

        function renderFeed(items) {
            const feed = document.getElementById('marketplace-feed');
            if(items.length === 0) {
                feed.innerHTML = `<div class="col-span-full p-20 text-center text-slate-600 italic">No active listings found in the market.</div>`;
                return;
            }

            feed.innerHTML = items.map(i => `
                <div class="market-card glass-panel p-6 rounded-3xl flex flex-col gap-4 border-t-2 ${i.type === 'Sell' ? 'border-t-emerald-500' : 'border-t-blue-500'}">
                    <div class="flex justify-between items-start">
                        <span class="px-2 py-1 rounded-md text-[8px] font-black uppercase tracking-widest ${i.type === 'Sell' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-blue-500/10 text-blue-400'}">
                            ${i.type}
                        </span>
                        <span class="text-[9px] text-slate-500 font-bold">${i.created_at.split(' ')[0]}</span>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-white uppercase tracking-tight line-clamp-1">${i.title}</h3>
                        <p class="text-sm text-slate-400 mt-2 line-clamp-3 h-[60px]">${i.description}</p>
                    </div>
                    <div class="flex items-center justify-between mt-2 pt-4 border-t border-white/5">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-violet-600/20 flex items-center justify-center text-[10px] text-violet-400 font-bold">${i.owner_name[0]}</div>
                            <span class="text-[10px] text-slate-400 font-black uppercase">${i.owner_name}</span>
                        </div>
                        <i class="fas fa-arrow-right text-slate-600"></i>
                    </div>
                </div>
            `).join('');
        }

        async function submitPost() {
            const title = document.getElementById('post-title').value;
            const desc = document.getElementById('post-desc').value;
            const type = document.getElementById('post-type').value;

            if(!title || !desc) return alert("Fields cannot be empty.");

            const res = await fetch(`${API_BASE}/api/marketplace/add`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({ title, description: desc, type })
            });

            if(res.ok) {
                location.reload();
            } else {
                alert("Network Authorization Failed.");
            }
        }

        window.onload = fetchFeed;
    </script>
</body>
</html>
