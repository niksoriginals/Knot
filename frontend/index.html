<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOT | Professional Campus Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        .mesh-gradient {
            background-color: #0a0a0c;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }

        .pro-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-gradient {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-gradient:focus-within {
            border-color: #818cf8;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5);
        }

        /* Smooth tab transition */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="mesh-gradient min-h-screen flex flex-col items-center justify-center p-4">

    <div class="mb-12 text-center fade-in">
        <div class="inline-block p-4 rounded-3xl bg-white/5 border border-white/10 mb-6">
            <i class="fas fa-knot text-4xl bg-gradient-to-br from-indigo-400 to-purple-500 bg-clip-text text-transparent"></i>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight text-white mb-2">KNOT<span class="text-indigo-500">.</span></h1>
        <p class="text-gray-400 text-lg font-light italic">The Smart Campus OS</p>
    </div>

    <div class="max-w-[420px] w-full pro-glass rounded-[40px] p-10 fade-in">
        
        <div id="auth-container">
            <div id="email-step" class="space-y-8">
                <div class="space-y-2">
                    <h2 class="text-2xl font-bold text-white">Welcome back</h2>
                    <p class="text-gray-400 text-sm">Sign in with your institutional ID</p>
                </div>

                <div class="space-y-4">
                    <div class="input-gradient flex items-center rounded-2xl p-4 group">
                        <i class="far fa-envelope text-gray-500 group-focus-within:text-indigo-400 mr-4 transition-colors"></i>
                        <input type="email" id="email" placeholder="Email Address" 
                            class="bg-transparent w-full outline-none text-white text-base placeholder-gray-600">
                    </div>
                    <button onclick="handleSendOTP()" id="send-btn" class="btn-primary w-full py-4 rounded-2xl text-white font-bold text-lg tracking-wide">
                        Continue
                    </button>
                </div>
            </div>

            <div id="otp-step" class="hidden space-y-8">
                <div class="space-y-2">
                    <h2 class="text-2xl font-bold text-white">Verify identity</h2>
                    <p class="text-gray-400 text-sm">We've sent a 6-digit code to your inbox</p>
                </div>

                <div class="space-y-6">
                    <div class="input-gradient rounded-2xl p-4">
                        <input type="text" id="otp" maxlength="6" placeholder="······" 
                            class="bg-transparent w-full text-center text-4xl tracking-[1.2rem] font-bold text-indigo-400 outline-none placeholder-gray-800">
                    </div>
                    
                    <button onclick="handleVerifyOTP()" class="btn-primary w-full py-4 rounded-2xl text-white font-bold text-lg">
                        Verify & Login
                    </button>

                    <div class="flex justify-between items-center text-sm px-2">
                        <button onclick="toggleSteps(false)" class="text-gray-500 hover:text-white transition-colors">Change email</button>
                        <button id="resend-btn" class="text-indigo-400 font-semibold hover:text-indigo-300">Resend Code</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden py-10 flex flex-col items-center space-y-4">
            <div class="w-12 h-12 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
            <p class="text-gray-400 text-xs animate-pulse">Establishing secure session...</p>
        </div>
    </div>

    <div class="mt-12 flex space-x-8 text-xs text-gray-600 font-medium">
        <a href="#" class="hover:text-gray-400 transition-colors uppercase tracking-widest">Support</a>
        <a href="#" class="hover:text-gray-400 transition-colors uppercase tracking-widest">Security</a>
        <a href="#" class="hover:text-gray-400 transition-colors uppercase tracking-widest">About ITS</a>
    </div>

    <script>
        const API_BASE = "https://apiknot.niksoriginals.in";

        async function sendOTP() {
            const emailInput = document.getElementById('email');
            const email = emailInput.value;
            
            if(!email.endsWith("@its.edu.in")) {
                emailInput.parentElement.classList.add('border-red-500');
                return alert("Please use your college email ID!");
            }

            toggleLoader(true);
            try {
                const response = await fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                
                if(response.ok) {
                    document.getElementById('display-email').innerText = email;
                    document.getElementById('email-section').classList.add('hidden');
                    document.getElementById('otp-section').classList.remove('hidden');
                } else {
                    alert("Error sending code. Try again.");
                }
            } catch (err) {
                alert("Server Unreachable!");
            }
            toggleLoader(false);
        }

        // verifyOTP and resetFlow functions same as before but UI updated
        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('email-section').classList.toggle('opacity-50', show);
            document.getElementById('send-btn').disabled = show;
        }

        function resetFlow() {
            document.getElementById('email-section').classList.remove('hidden');
            document.getElementById('otp-section').classList.add('hidden');
        }
    </script>
</body>
</html>
