<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOT | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: fadeIn 0.6s ease-out forwards; }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .input-focus:focus-within { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[120px]"></div>

    <div class="max-w-md w-full animate-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 rounded-2xl shadow-2xl mb-4 rotate-3">
                <i class="fas fa-knot text-3xl text-white -rotate-3"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter">KNOT</h1>
            <p class="text-gray-400 font-medium">ITS Engineering College Ecosystem</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
            
            <div id="email-section" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-400 ml-1">Official College Email</label>
                    <div class="flex items-center bg-gray-950/50 rounded-2xl border border-gray-800 px-4 py-4 input-focus transition-all">
                        <i class="fas fa-envelope text-gray-600 mr-3"></i>
                        <input type="email" id="email" placeholder="name@its.edu.in" 
                            class="bg-transparent w-full outline-none text-white placeholder-gray-600">
                    </div>
                </div>
                <button onclick="sendOTP()" id="send-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-600/20">
                    Send Access Code
                </button>
            </div>

            <div id="otp-section" class="hidden space-y-6">
                <div class="text-center">
                    <p class="text-gray-400 text-sm">Verify code sent to <br><span id="display-email" class="text-indigo-400 font-bold"></span></p>
                </div>
                <div class="space-y-2">
                    <input type="text" id="otp" maxlength="6" placeholder="000000" 
                        class="bg-gray-950/50 w-full text-center text-4xl tracking-[1rem] font-black py-4 rounded-2xl border border-gray-800 outline-none focus:border-indigo-500 text-indigo-400 transition-all">
                    <div class="flex justify-between items-center px-1">
                        <button onclick="resetFlow()" class="text-xs text-gray-500 hover:text-white">Change Email</button>
                        <p id="resend-timer" class="text-xs text-indigo-400 font-medium cursor-pointer">Resend in 00:59</p>
                    </div>
                </div>
                <button onclick="verifyOTP()"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-emerald-600/20">
                    Verify & Authenticate
                </button>
            </div>

            <div id="name-section" class="hidden space-y-6">
                <div class="text-center">
                    <h2 class="text-2xl font-bold text-white">Welcome to KNOT!</h2>
                    <p class="text-gray-400 text-sm mt-1">Let's set up your profile.</p>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-400 ml-1">Your Full Name</label>
                    <div class="flex items-center bg-gray-950/50 rounded-2xl border border-gray-800 px-4 py-4 input-focus transition-all">
                        <i class="fas fa-user text-gray-600 mr-3"></i>
                        <input type="text" id="fullname" placeholder="Enter your name" 
                            class="bg-transparent w-full outline-none text-white placeholder-gray-600">
                    </div>
                </div>
                <button onclick="updateProfile()"
                    class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold py-4 rounded-2xl transition-all shadow-lg">
                    Complete Setup
                </button>
            </div>

            <div id="loader" class="hidden text-center py-6">
                <div class="flex items-center justify-center space-x-2 animate-pulse">
                    <div class="w-3 h-3 bg-indigo-500 rounded-full"></div>
                    <div class="w-3 h-3 bg-indigo-500 rounded-full"></div>
                    <div class="w-3 h-3 bg-indigo-500 rounded-full"></div>
                </div>
                <p class="text-xs text-gray-500 mt-4 font-medium uppercase tracking-widest">Processing</p>
            </div>
        </div>

        <p class="text-center text-gray-600 text-[10px] mt-8 uppercase tracking-[0.2em]">
            &copy; 2026 KNOT | Secure Campus Gateway
        </p>
    </div>

    <script>
        const API_BASE = "https://apiknot.niksoriginals.in";

        async function sendOTP() {
            const emailInput = document.getElementById('email');
            const email = emailInput.value;
            
            if(!email.endsWith("@its.edu.in")) {
                alert("Please use your @its.edu.in email!");
                return;
            }

            toggleLoader(true);
            try {
                const res = await fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                if(res.ok) {
                    document.getElementById('display-email').innerText = email;
                    showSection('otp-section');
                } else {
                    alert("Error sending OTP. Please retry.");
                }
            } catch (err) { alert("Server connection failed."); }
            toggleLoader(false);
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;

            toggleLoader(true);
            try {
                const res = await fetch(`${API_BASE}/auth/verify-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, otp })
                });
                
                if(res.ok) {
                    const data = await res.json();
                    // Backend se flag check karo: is_new_user?
                    if(data.is_new_user) {
                        showSection('name-section');
                    } else {
                        window.location.href = "/dashboard";
                    }
                } else {
                    alert("Invalid or Expired OTP.");
                }
            } catch (err) { alert("Verification error."); }
            toggleLoader(false);
        }

        async function updateProfile() {
            const name = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;

            if(!name) return alert("Name is required!");

            toggleLoader(true);
            try {
                const res = await fetch(`${API_BASE}/api/update-profile`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, name })
                });
                if(res.ok) {
                    window.location.href = "/dashboard";
                }
            } catch (err) { alert("Profile update failed."); }
            toggleLoader(false);
        }

        function showSection(id) {
            document.getElementById('email-section').classList.add('hidden');
            document.getElementById('otp-section').classList.add('hidden');
            document.getElementById('name-section').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            const activeSec = document.querySelector('div[id$="-section"]:not(.hidden)');
            if(activeSec) activeSec.style.opacity = show ? "0.3" : "1";
        }

        function resetFlow() { showSection('email-section'); }
    </script>
</body>
</html>
