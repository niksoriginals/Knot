<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOT | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: fadeIn 0.6s ease-out forwards; }
        .glass { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }
        .input-focus:focus-within { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[120px]"></div>

    <div class="max-w-md w-full animate-up">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 rounded-2xl shadow-2xl shadow-indigo-500/50 mb-4 rotate-3">
                <i class="fas fa-knot text-3xl text-white -rotate-3"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">KNOT</h1>
            <p class="text-gray-400 font-medium">Unified Campus Ecosystem</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div id="email-section" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-300 ml-1">Official College Email</label>
                    <div class="flex items-center bg-gray-900/50 rounded-xl border border-gray-700 px-4 py-4 input-focus transition-all">
                        <i class="fas fa-envelope text-gray-500 mr-3"></i>
                        <input type="email" id="email" placeholder="name@its.edu.in" 
                            class="bg-transparent w-full outline-none text-white placeholder-gray-600">
                    </div>
                    <p class="text-[11px] text-gray-500 italic px-1">Verification link will be sent to this ID.</p>
                </div>

                <button onclick="sendOTP()" id="send-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-600/30 flex items-center justify-center group">
                    <span>Send Access Code</span>
                    <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>

            <div id="otp-section" class="hidden space-y-6">
                <div class="text-center">
                    <p class="text-gray-400 text-sm">Code sent to <span id="display-email" class="text-indigo-400 font-bold"></span></p>
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-center">
                        <input type="text" id="otp" maxlength="6" placeholder="000000" 
                            class="bg-gray-900/50 w-full text-center text-4xl tracking-[1rem] font-black py-4 rounded-xl border border-gray-700 outline-none focus:border-indigo-500 text-indigo-400 transition-all">
                    </div>
                    <div class="flex justify-between items-center px-1">
                        <button onclick="resetFlow()" class="text-xs text-gray-500 hover:text-white transition-colors">Change Email</button>
                        <p id="resend-timer" class="text-xs text-indigo-400 font-medium cursor-pointer">Resend in 00:59</p>
                    </div>
                </div>

                <button onclick="verifyOTP()"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-emerald-600/30">
                    Verify & Authenticate
                </button>
            </div>

            <div id="loader" class="hidden text-center py-4">
                <div class="flex items-center justify-center space-x-2">
                    <div class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                </div>
                <p class="text-xs text-gray-500 mt-2">Securing connection...</p>
            </div>
        </div>

        <p class="text-center text-gray-600 text-xs mt-8">
            &copy; 2026 KNOT System | ITS Engineering College
        </p>
    </div>

    <script>
        const API_BASE = "https://apiknot.niksoriginals.in";

        async function sendOTP() {
            const emailInput = document.getElementById('email');
            const email = emailInput.value;
            
            if(!email.endsWith("@its.edu.in")) {
                emailInput.parentElement.classList.add('border-red-500');
                return alert("Please use your college email ID!");
            }

            toggleLoader(true);
            try {
                const response = await fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                
                if(response.ok) {
                    document.getElementById('display-email').innerText = email;
                    document.getElementById('email-section').classList.add('hidden');
                    document.getElementById('otp-section').classList.remove('hidden');
                } else {
                    alert("Error sending code. Try again.");
                }
            } catch (err) {
                alert("Server Unreachable!");
            }
            toggleLoader(false);
        }

        // verifyOTP and resetFlow functions same as before but UI updated
        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('email-section').classList.toggle('opacity-50', show);
            document.getElementById('send-btn').disabled = show;
        }

        function resetFlow() {
            document.getElementById('email-section').classList.remove('hidden');
            document.getElementById('otp-section').classList.add('hidden');
        }
    </script>
</body>
</html>
